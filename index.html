<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Order summary card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <main class="card__container">
    <article class="card">
      <section class="card__img-container">
        <img class="card__img" src="images/illustration-hero.svg" alt="">
      </section>
      <section class="card__info">
        <h1 class="card__title">Order Summary</h1>
        <p class="card__description">
          You can now listen to millions of songs, audiobooks, and podcasts on any
          device anywhere you like!
        </p>
        <div class="card__plan-container">
          <div class="card__plan">
            <img class="card__plan-img" src="images/icon-music.svg" alt="">
            <p class="card__plan-name">
              Annual Plan
              <span class="card__plan-price">$59.99/year</span>
            </p>
          </div>
          <a class="card__plan-change" href="">Change</a>
        </div>
        <button class="card__btn-pay btn" type="button">Proceed to Payment</button>
        <button class="card__btn-cancel btn" type="button">Cancel Order</button>
      </section>
    </article>
  </main>


</body>

</html>
